name: Deploy

on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
      app-version:
        required: true
        type: string
      distribution-channel:
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: 'bash'

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_audit: false
  npm_config_fund: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{inputs.distribution-channel}}
      url: https://github.com/${{github.repository}}/releases/tag/v${{inputs.app-version}}
    steps:
      - name: Download compiled app
        uses: actions/download-artifact@v8
        with:
          pattern: "${{inputs.project-name}}-*"
          path: dist
          merge-multiple: true
      
      # - run: ls -la
      #   working-directory: ./
      # - run: ls -la dist
      #   working-directory: ./
      # - run: mkdir unsigned

      - name: zip mac x86 without a docker container (the year is 20XX)
        run: zip -r ./unsigned/${{inputs.project-name}}-${{inputs.app-version}}-mac-x86.zip ./dist/mac

      - name: zip mac arm without a docker container (the year is 20XX)
        run: zip -r ./unsigned/${{inputs.project-name}}-${{inputs.app-version}}-mac-arm64.zip ./dist/mac-arm64
      
      - name: zip linux without a docker container (the year is 20XX)
        run: zip -r ./unsigned/${{inputs.project-name}}-${{inputs.app-version}}-ubuntu.zip ./dist/linux-unpacked

      - name: zip windows without a docker container (the year is 20XX)
        run: zip -r ./unsigned/${{inputs.project-name}}-${{inputs.app-version}}-windows.zip ./dist/win-unpacked

      # - run: ls -la unsigned
      #   working-directory: ./

      - run: gh release create v${{inputs.app-version}} unsigned/* --repo ${{github.repository}}
        env:
          GH_TOKEN: ${{ github.token }}
